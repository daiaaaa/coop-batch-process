spring.application.name=coopbatchprocess
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/coopbatchprocess}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.batch.jdbc.initialize-schema=always
logging.level.root=INFO
logging.level.org.springframework.batch=INFO
logging.level.com.example.coopbatchprocess=DEBUG
logging.level.com.daiana.coopbatchprocess=DEBUG
